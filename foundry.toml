[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# Script preparation tests mutate shared process env vars through vm.setEnv.
# Several preparation tests also etch fixed hook-permission addresses.
# Keep suites serial and isolated so full `forge test` is deterministic.
threads = 1
isolate = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
